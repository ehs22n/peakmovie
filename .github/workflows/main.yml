name: Build Debug APK (.NET 9 Blazor Hybrid)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      # 1) دریافت کد
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2) نصب .NET 9 SDK
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # 3) نصب workload های MAUI
      - name: Install MAUI Workload
        run: dotnet workload install maui

      # 4) ساخت پروژه Blazor Hybrid با .NET 9
      - name: Create Blazor Hybrid Project
        run: |
          dotnet new maui-blazor -n PeakMovie.App --framework net9.0
          echo "PROJECT CREATED (.NET 9)"

      # 5) Restore داخل مسیر پروژه
      - name: Restore Project
        working-directory: PeakMovie.App
        run: |
          dotnet restore
          dotnet workload restore

      # 6) ساخت APK
      - name: Publish Android APK
        working-directory: PeakMovie.App
        run: |
          dotnet publish `
            -f net9.0-android `
            -c Debug `
            -p:RuntimeIdentifier=android-arm64 `
            -p:AndroidPackageFormat=apk `
            -p:AndroidUseSharedRuntime=false `
            -p:PublishTrimmed=false `
            -p:AndroidLinkTool=None `
            -p:UseInterpreter=true `
            -o ../publish

      # 7) ساخت مسیر خروجی
      - name: Prepare Release Folder
        run: |
          New-Item -ItemType Directory -Force -Path "releases/android" | Out-Null

      # 8) کپی APK ساخته‌شده
      - name: Copy APK
        run: |
          $apk = Get-ChildItem -Path publish -Filter *.apk -Recurse | Select-Object -First 1
          Copy-Item $apk.FullName "releases/android/PeakMovie-Debug.apk" -Force

      # 9) Commit و Push فایل APK
      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add releases/android/PeakMovie-Debug.apk
          git commit -m "Generated Debug APK (.NET 9 Auto Project Creation)" || echo "No changes"
          git push
