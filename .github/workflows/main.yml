name: Build Universal Debug APK (.NET 9 MAUI Blazor)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: windows-latest

    steps:

      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET 9
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # 3️⃣ Install MAUI Android Workloads (فقط نصب، نه restore)
      - name: Install MAUI Workloads
        run: |
          dotnet workload install maui
          dotnet workload install maui-android
          dotnet workload repair

      # 4️⃣ Create Project
      - name: Create Project
        run: |
          dotnet new maui-blazor -n PeakMovie.App --framework net9.0

      # 5️⃣ Restore Project (بعد از ساخته شدن پروژه)
      - name: Restore Project
        working-directory: PeakMovie.App
        run: |
          dotnet restore

      # 6️⃣ Publish Universal Debug APK
      - name: Publish Android APK
        working-directory: PeakMovie.App
        run: |
          dotnet publish -f net9.0-android -c Debug `
            -p:RuntimeIdentifiers="android-arm;android-arm64" `
            -p:AndroidPackageFormat=apk `
            -p:AndroidUseSharedRuntime=false `
            -p:PublishTrimmed=false `
            -p:AndroidLinkMode=None `
            -p:UseInterpreter=false `
            -p:AndroidEnableMultiDex=true `
            -o ../publish

      # 7️⃣ Create Release Folder
      - name: Prepare Release Folder
        run: |
          New-Item -ItemType Directory -Force -Path "releases/android" | Out-Null

      # 8️⃣ Copy APK
      - name: Copy APK
        run: |
          $apk = Get-ChildItem -Path publish -Filter *.apk -Recurse | Select-Object -First 1
          Copy-Item $apk.FullName "releases/android/PeakMovie-Debug.apk" -Force

      # 9️⃣ Commit APK
      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add releases/android/PeakMovie-Debug.apk
          git commit -m "Auto Build Universal Debug APK (.NET 9 MAUI)" || echo "No changes"
          git push
