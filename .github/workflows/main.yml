name: Build Universal Debug APK (.NET 9 MAUI Blazor)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: windows-latest

    steps:

      # 1️⃣ دریافت سورس
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ نصب .NET 9
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # 3️⃣ نصب MAUI
      - name: Install MAUI Workload
        run: dotnet workload install maui

      # 4️⃣ ساخت پروژه Blazor Hybrid
      - name: Create Project
        run: |
          dotnet new maui-blazor -n PeakMovie.App --framework net9.0
          echo "MAUI Blazor Project Created"

      # 5️⃣ Restore پروژه (مسیر صحیح)
      - name: Restore Project
        working-directory: PeakMovie.App
        run: |
          dotnet restore
          dotnet workload restore PeakMovie.App.csproj

      # 6️⃣ Build APK سازگار با اکثر دستگاه‌ها
      - name: Publish Android APK
        working-directory: PeakMovie.App
        run: |
          dotnet publish `
            -f net9.0-android `
            -c Debug `
            -p:RuntimeIdentifiers=android-arm;android-arm64 `
            -p:AndroidPackageFormat=apk `
            -p:AndroidUseSharedRuntime=false `
            -p:PublishTrimmed=false `
            -p:AndroidLinkMode=None `
            -p:UseInterpreter=false `
            -p:AndroidEnableMultiDex=true `
            -o ../publish

      # 7️⃣ ساخت پوشه خروجی
      - name: Prepare Release Folder
        run: |
          New-Item -ItemType Directory -Force -Path "releases/android" | Out-Null

      # 8️⃣ پیدا کردن APK
      - name: Copy APK
        run: |
          $apk = Get-ChildItem -Path publish -Filter *.apk -Recurse | Select-Object -First 1
          Copy-Item $apk.FullName "releases/android/PeakMovie-Debug.apk" -Force

      # 9️⃣ Commit خروجی
      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add releases/android/PeakMovie-Debug.apk
          git commit -m "Auto Build Universal Debug APK (.NET 9 MAUI)" || echo "No changes"
          git push
