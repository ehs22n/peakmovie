name: Build Avalonia From Zero And Push APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: '9.0.x'
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS: '34.0.0'
      PROJECT_NAME: 'MananagarApp'

    steps:
    # -----------------------------
    # Checkout
    # -----------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -----------------------------
    # Setup .NET
    # -----------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # -----------------------------
    # Install Avalonia Templates
    # -----------------------------
    - name: Install Avalonia Templates
      run: dotnet new install Avalonia.Templates

    # -----------------------------
    # Create Project From Scratch
    # -----------------------------
    - name: Create Avalonia Cross Platform Project
      run: |
        dotnet new avalonia.xplat -n $PROJECT_NAME
        dotnet restore

    # -----------------------------
    # Setup Java
    # -----------------------------
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # -----------------------------
    # Setup Android SDK
    # -----------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Packages
      run: |
        sdkmanager "platforms;android-${ANDROID_API_LEVEL}"
        sdkmanager "build-tools;${ANDROID_BUILD_TOOLS}"
        sdkmanager "platform-tools"

    # -----------------------------
    # Generate Simple Debug Keystore
    # -----------------------------
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v \
          -keystore debug.keystore \
          -alias debug \
          -storepass android \
          -keypass android \
          -dname "CN=Mananagar,O=Dev,C=US" \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000

    # -----------------------------
    # Build Signed APK
    # -----------------------------
    - name: Publish Signed APK
      run: |
        cd $PROJECT_NAME
        dotnet publish ${PROJECT_NAME}.Android \
          -c Release \
          -p:AndroidKeyStore=true \
          -p:AndroidSigningKeyStore=../debug.keystore \
          -p:AndroidSigningKeyAlias=debug \
          -p:AndroidSigningKeyPass=android \
          -p:AndroidSigningStorePass=android \
          -o ../output

    # -----------------------------
    # Move APK to repo root
    # -----------------------------
    - name: Prepare APK Folder
      run: |
        mkdir -p apk
        find output -name "*.apk" -exec cp {} apk/app-release.apk \;

    # -----------------------------
    # Commit and Push APK
    # -----------------------------
    - name: Commit and Push APK
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add apk/app-release.apk
        git commit -m "Auto build: Add signed APK"
        git push
